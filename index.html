<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Label Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #cbd5e1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 1. PASTE YOUR GOOGLE DEPLOYMENT URL HERE
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRds3GZj62tfEBCI312CSpIaRFFsllJswOo4W3FdAeO0-xsnVkyxbFGQ55MDS86x3cgw/exec";

        function App() {
            const [orderId, setOrderId] = useState('');
            const [trackingNumber, setTrackingNumber] = useState('');
            const [courier, setCourier] = useState('FedEx Ground');
            const [status, setStatus] = useState('idle');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('syncing');

                const payload = { orderId, trackingNumber, courier };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });

                    setStatus('success');
                    setOrderId('');
                    setTrackingNumber('');
                    setTimeout(() => setStatus('idle'), 3000);
                } catch (error) {
                    setStatus('error');
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10 font-sans">
                    <div className="max-w-2xl mx-auto space-y-6">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                                    <span className="text-blue-500 text-3xl">⬢</span> Return Label Tracker
                                </h1>
                                <p className="text-slate-500 text-xs mt-1">Upload labels → Auto-syncs to Google Sheet</p>
                            </div>
                            <div className="bg-[#1a212d] border border-slate-800 px-4 py-2 rounded-full flex items-center gap-2 text-green-400 text-[10px] font-bold uppercase">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                Google Connected
                            </div>
                        </div>

                        <form onSubmit={handleSubmit} className="bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-8 shadow-2xl">
                            <div className="space-y-3">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Step 1 — Order ID</label>
                                <input required value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="e.g. SH1210..." className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500"/>
                            </div>

                            <div className="space-y-3">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Step 2 — Tracking</label>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <input required value={trackingNumber} onChange={(e) => setTrackingNumber(e.target.value)} placeholder="Tracking #" className="md:col-span-2 w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500"/>
                                    <select value={courier} onChange={(e) => setCourier(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none">
                                        <option>FedEx Ground</option>
                                        <option>UPS</option>
                                        <option>Amazon</option>
                                        <option>USPS</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" disabled={status === 'syncing'} className={`w-full py-5 rounded-2xl font-bold text-lg transition-all ${status === 'syncing' ? 'bg-slate-700' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/20'}`}>
                                {status === 'syncing' ? 'Syncing...' : status === 'success' ? '✓ Synced!' : 'Sync Return Data'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
