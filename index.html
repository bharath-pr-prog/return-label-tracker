<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Label Tracker v3</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>body { background-color: #0b0e14; color: #cbd5e1; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdIPbZMo15VALfuFV-2oduY66z-8ufKIu1IaOgLK7pw7_B_Z73d9BEzXvXjBYzyZHQ5w/exec";

        function App() {
            const [orderId, setOrderId] = useState('');
            const [file, setFile] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [extracted, setExtracted] = useState({ trk: '', courier: '' });
            const [status, setStatus] = useState('idle');
            const [progress, setProgress] = useState(0);
            const [history, setHistory] = useState([]); // To track records
            const fileInputRef = useRef(null);

            const parseLabelText = (text) => {
                // Clean the text to handle common OCR mistakes
                const cleanText = text.replace(/\s+/g, ' ');
                
                // 1. Look specifically for the sequence after "TRK#" or "TRACKING #"
                const trkRegex = /(?:TRK#|TRACKING|TRK)\s*[:#]?\s*([\d\s]{12,15})/i;
                const match = cleanText.match(trkRegex);
                
                let trk = "Not Found";
                let courier = "Unknown";

                if (match) {
                    trk = match[1].replace(/\s/g, '').trim();
                    courier = "FedEx Ground"; // Priority for TRK# labels
                } else {
                    // Fallback to general FedEx 12-digit search (excluding dates)
                    const fedexMatch = cleanText.match(/\b\d{12}\b/);
                    if (fedexMatch) trk = fedexMatch[0];
                }

                if (cleanText.includes("UPS") || trk.startsWith("1Z")) courier = "UPS";
                
                return { trk, courier };
            };

            const handleFileUpload = async (e) => {
                const uploadedFile = e.target.files[0];
                if (!uploadedFile) return;

                setFile(uploadedFile);
                setStatus('scanning');
                
                const reader = new FileReader();
                reader.onloadend = () => setBase64Image(reader.result);
                reader.readAsDataURL(uploadedFile);

                try {
                    let imageSource;
                    if (uploadedFile.type === "application/pdf") {
                        const pdfjsLib = window['pdfjs-dist/build/pdf'];
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                        const arrayBuffer = await uploadedFile.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 2 });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        imageSource = canvas.toDataURL();
                    } else {
                        imageSource = URL.createObjectURL(uploadedFile);
                    }

                    const { data: { text } } = await Tesseract.recognize(imageSource, 'eng');
                    setExtracted(parseLabelText(text));
                    setStatus('ready');
                } catch (err) {
                    setStatus('idle');
                    alert("Error scanning. Please try again.");
                }
            };

            const handleSync = async () => {
                setStatus('syncing');
                const payload = { orderId, trackingNumber: extracted.trk, courier: extracted.courier, image: base64Image };

                try {
                    // Note: We use standard fetch here to try and get the URL back
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                    });

                    // Add to local history list
                    setHistory([{orderId, trk: extracted.trk, courier: extracted.courier}, ...history]);

                    setStatus('success');
                    setTimeout(() => {
                        setOrderId(''); setFile(null); setExtracted({ trk: '', courier: '' }); setStatus('idle');
                    }, 2000);
                } catch (error) {
                    setStatus('ready');
                    alert("Sync completed (check your sheet).");
                }
            };

            return (
                <div className="min-h-screen p-6 font-sans flex flex-col items-center gap-6">
                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-6 shadow-2xl">
                        <h1 className="text-xl font-bold text-white">⬢ Return Tracker</h1>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="text-[10px] text-slate-500 uppercase font-bold">Step 1 — Order ID</label>
                                <input value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="e.g. CMR4293" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 mt-1 text-white outline-none focus:border-blue-500"/>
                            </div>

                            <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-slate-700 rounded-2xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-500/5">
                                <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*,.pdf" className="hidden" />
                                {file ? <p className="text-blue-400 font-bold">{file.name}</p> : <p className="text-slate-500 text-sm">Click to Upload Label</p>}
                            </div>

                            {status !== 'idle' && (
                                <div className="bg-[#0b0e14] p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase">Tracking Number</p>
                                        <p className="font-mono text-white">{extracted.trk || 'Scanning...'}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase">Courier</p>
                                        <p className="text-blue-400 font-bold">{extracted.courier || 'Scanning...'}</p>
                                    </div>
                                </div>
                            )}

                            <button onClick={handleSync} disabled={status !== 'ready' || !orderId} className={`w-full py-4 rounded-xl font-bold ${status==='ready'?'bg-blue-600 text-white':'bg-slate-800 text-slate-600'}`}>
                                {status === 'syncing' ? 'Uploading Image & Syncing...' : status === 'success' ? '✓ Synced!' : 'Confirm & Sync'}
                            </button>
                        </div>
                    </div>

                    {/* Records List */}
                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-4 shadow-2xl">
                        <h2 className="text-sm font-bold text-slate-400 uppercase tracking-widest">Recent Records ({history.length})</h2>
                        <div className="space-y-3">
                            {history.length === 0 && <p className="text-slate-600 text-xs italic text-center py-4">No records yet this session</p>}
                            {history.map((rec, i) => (
                                <div key={i} className="flex justify-between items-center bg-[#0b0e14] p-4 rounded-xl border border-slate-800">
                                    <div>
                                        <p className="text-white font-bold text-sm">{rec.orderId}</p>
                                        <p className="text-[10px] text-slate-500 font-mono">{rec.trk}</p>
                                    </div>
                                    <span className="text-[10px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded-md">{rec.courier}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
