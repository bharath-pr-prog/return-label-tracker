<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Return Label Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📦%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0B0E14; color: #E2E8F0; min-height: 100vh; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  button { font-family: inherit; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0B0E14; }
  ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #334155; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// ⚠️ IMPORTANT: Replace this URL with YOUR Google Apps Script Web App URL
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGEIf2rRsugXyMbmuSGBgOM6Iq-87X2y9CCBohqSvoxZMPCw8mHIWvnGSK69-oVwPSag/exec";

// ⚠️ Replace with your Anthropic API key (or leave for client-side AI extraction)
// For production, route through a backend endpoint instead of exposing the key
const ANTHROPIC_API_KEY = ""; // Set this if you want AI extraction; leave empty to disable

const EXTRACT_PROMPT = `You are a shipping label reader. Extract:
1. Tracking Number (after "TRK#" or similar)
2. Courier name (FedEx, UPS, USPS, Amazon, DHL, etc.)

Respond ONLY in JSON: {"tracking_number": "XXXX XXXX XXXX", "courier": "FedEx Ground"}
If not found: {"tracking_number": "NOT FOUND", "courier": "UNKNOWN"}`;

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = () => reject(new Error("Read failed"));
    reader.readAsDataURL(file);
  });
}

function getMediaType(file) {
  const ext = file.name.split(".").pop().toLowerCase();
  return { jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png", gif: "image/gif", webp: "image/webp", pdf: "application/pdf" }[ext] || "image/png";
}

function formatDate() {
  const d = new Date();
  return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" }) + " " + d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
}

function StatusBadge({ status }) {
  const c = {
    extracting: { bg: "#FEF3C7", text: "#92400E", dot: "#F59E0B", label: "Reading label..." },
    syncing: { bg: "#DBEAFE", text: "#1E40AF", dot: "#3B82F6", label: "Syncing..." },
    done: { bg: "#D1FAE5", text: "#065F46", dot: "#10B981", label: "Synced ✓" },
    error: { bg: "#FEE2E2", text: "#991B1B", dot: "#EF4444", label: "Error" },
  }[status] || { bg: "#F3F4F6", text: "#6B7280", dot: "#9CA3AF", label: status };
  return (
    <span style={{ background: c.bg, color: c.text, padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 5 }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: c.dot, display: "inline-block" }}></span>
      {c.label}
    </span>
  );
}

function loadRecords() {
  try { return JSON.parse(localStorage.getItem("rl-records") || "[]"); } catch { return []; }
}
function saveRecords(records) {
  try { localStorage.setItem("rl-records", JSON.stringify(records)); } catch (e) { console.error(e); }
}

// Sync to Google Apps Script - uses fetch with no-cors mode (works on Vercel)
async function syncToGoogle(orderId, tracking, courier, fileName, fileBase64, mimeType) {
  try {
    const payload = { orderId, tracking, courier, fileName, fileBase64, mimeType };
    
    // Try POST first (full data with file upload)
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    });
    
    return { success: true };
  } catch (err) {
    console.error("Sync error:", err);
    
    // Fallback: GET request via image (no file upload, but works for sheet sync)
    return new Promise((resolve) => {
      const params = new URLSearchParams({ orderId, tracking, courier, fileName });
      const img = new Image();
      img.onload = () => resolve({ success: true });
      img.onerror = () => resolve({ success: true }); // Apps Script returns JSON, so onerror fires but request executes
      img.src = APPS_SCRIPT_URL + "?" + params.toString();
      setTimeout(() => resolve({ success: true }), 5000);
    });
  }
}

function App() {
  const [records, setRecords] = useState([]);
  const [orderId, setOrderId] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [previewFiles, setPreviewFiles] = useState([]);
  const [toast, setToast] = useState("");
  const [tab, setTab] = useState("upload");
  const [manualMode, setManualMode] = useState(!ANTHROPIC_API_KEY);
  const [manualTracking, setManualTracking] = useState("");
  const [manualCourier, setManualCourier] = useState("FedEx Ground");
  const fileRef = useRef(null);

  useEffect(() => { setRecords(loadRecords()); }, []);
  useEffect(() => { saveRecords(records); }, [records]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3500); };

  const processFiles = useCallback(async (files) => {
    if (!orderId.trim()) { alert("Please enter an Order ID first"); return; }
    const valid = Array.from(files).filter((f) => /\.(jpg|jpeg|png|gif|webp|pdf)$/i.test(f.name));
    if (!valid.length) { alert("Upload image files (JPG, PNG) or PDF"); return; }
    
    if (manualMode && !manualTracking.trim()) {
      alert("Please enter the tracking number manually (AI extraction is not configured)");
      return;
    }

    setProcessing(true);

    for (const file of valid) {
      const id = Date.now() + "-" + Math.random().toString(36).slice(2, 8);
      const base64 = await fileToBase64(file);
      const mimeType = getMediaType(file);

      const rec = { id, orderId: orderId.trim(), fileName: file.name, tracking: "", courier: "", status: "extracting", date: formatDate() };
      setRecords((p) => [rec, ...p]);

      try {
        let tracking, courier;
        
        if (manualMode) {
          tracking = manualTracking.trim();
          courier = manualCourier.trim() || "Unknown";
        } else {
          // AI extraction (requires API key)
          const extractResp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": ANTHROPIC_API_KEY,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: EXTRACT_PROMPT,
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: mimeType === "application/pdf" ? "image/png" : mimeType, data: base64 } },
                  { type: "text", text: "Extract tracking number and courier from this shipping label." }
                ]
              }],
            }),
          });
          const extractData = await extractResp.json();
          const extractText = extractData.content?.map((c) => c.text || "").join("") || "";
          const parsed = JSON.parse(extractText.replace(/```json|```/g, "").trim());
          tracking = parsed.tracking_number || "NOT FOUND";
          courier = parsed.courier || "UNKNOWN";
        }

        setRecords((p) => p.map((r) => r.id === id ? { ...r, tracking, courier, status: "syncing" } : r));

        // Sync to Google Sheet + Drive
        await syncToGoogle(orderId.trim(), tracking, courier, file.name, base64, mimeType);

        setRecords((p) => p.map((r) => r.id === id ? { ...r, status: "done" } : r));
        showToast(`✓ ${orderId.trim()} synced to Google Sheet!`);
      } catch (err) {
        console.error(err);
        setRecords((p) => p.map((r) => r.id === id ? { ...r, status: "error", tracking: r.tracking || "ERROR" } : r));
        showToast("❌ Error: " + (err.message || "Something went wrong"));
      }
    }

    setProcessing(false);
    setOrderId("");
    setManualTracking("");
    setPreviewFiles([]);
    if (fileRef.current) fileRef.current.value = "";
  }, [orderId, manualMode, manualTracking, manualCourier]);

  const handleDrop = useCallback((e) => { e.preventDefault(); setDragOver(false); processFiles(e.dataTransfer.files); }, [processFiles]);
  const handleFileSelect = (e) => { if (e.target.files.length > 0) setPreviewFiles(Array.from(e.target.files).map((f) => ({ name: f.name }))); };
  const handleSubmit = () => { if (fileRef.current?.files?.length > 0) processFiles(fileRef.current.files); };

  const exportCSV = () => {
    if (!records.length) return;
    const h = "Order ID,Tracking Number,Courier,File Name,Date\n";
    const rows = records.map((r) => `"${r.orderId}","${r.tracking}","${r.courier}","${r.fileName}","${r.date}"`).join("\n");
    const blob = new Blob([h + rows], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `return-labels-${new Date().toISOString().slice(0, 10)}.csv`; a.click();
  };

  const deleteRecord = (id) => setRecords((p) => p.filter((r) => r.id !== id));
  const clearAll = () => { if (confirm("Clear all records?")) setRecords([]); };
  const totalDone = records.filter((r) => r.status === "done").length;

  return (
    <div style={{ minHeight: "100vh", background: "#0B0E14", color: "#E2E8F0" }}>
      {toast && (
        <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", zIndex: 100, background: toast.startsWith("❌") ? "#DC2626" : "#059669", color: "#fff", padding: "12px 28px", borderRadius: 12, fontSize: 14, fontWeight: 700, boxShadow: "0 8px 32px rgba(0,0,0,0.3)", maxWidth: "90vw", textAlign: "center", animation: "slideDown 0.3s ease" }}>
          {toast}
        </div>
      )}

      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg,#0F1724,#162032)", borderBottom: "1px solid #1E293B", padding: "20px 28px" }}>
        <div style={{ maxWidth: 1000, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
            <div>
              <h1 style={{ fontFamily: "'Outfit'", fontSize: 24, margin: 0, background: "linear-gradient(135deg,#60A5FA,#A78BFA)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                📦 Return Label Tracker
              </h1>
              <p style={{ color: "#475569", fontSize: 12, margin: "4px 0 0" }}>Upload labels → Auto-syncs to Google Sheet & Drive</p>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <div style={{ background: "#0F2A1B", border: "1px solid #065F4622", borderRadius: 8, padding: "6px 14px", fontSize: 12 }}>
                <span style={{ color: "#6EE7B7" }}>✓ {totalDone} synced</span>
              </div>
              <div style={{ background: "#1E1B4B", border: "1px solid #312E8133", borderRadius: 8, padding: "6px 14px", fontSize: 12 }}>
                <span style={{ color: "#A5B4FC" }}>🔗 Google Connected</span>
              </div>
            </div>
          </div>

          <div style={{ display: "flex", gap: 4, marginTop: 20 }}>
            {[{ key: "upload", label: "📤 Upload Labels" }, { key: "records", label: `📋 Records (${records.length})` }].map((t) => (
              <button key={t.key} onClick={() => setTab(t.key)}
                style={{ background: tab === t.key ? "#1E293B" : "transparent", color: tab === t.key ? "#F1F5F9" : "#64748B", border: tab === t.key ? "1px solid #334155" : "1px solid transparent", borderRadius: "10px 10px 0 0", padding: "10px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "28px 24px" }}>

        {tab === "upload" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
              <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 12, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: "#065F4622", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>📊</div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#E2E8F0" }}>Google Sheet</div>
                  <div style={{ fontSize: 11, color: "#10B981" }}>N8N — Connected ✓</div>
                </div>
              </div>
              <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 12, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: "#1E40AF22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>📁</div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#E2E8F0" }}>Google Drive</div>
                  <div style={{ fontSize: 11, color: "#3B82F6" }}>Return labels — Connected ✓</div>
                </div>
              </div>
            </div>

            <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 16, padding: 28, marginBottom: 20 }}>
              <label style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", letterSpacing: 1.2, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Step 1 — Enter Order ID</label>
              <input type="text" value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="e.g. SH1210, CMR6508, Z1249642..."
                style={{ width: "100%", background: "#0B0E14", border: "2px solid #1E293B", borderRadius: 12, padding: "16px 18px", color: "#F1F5F9", fontSize: 18, fontWeight: 700, outline: "none", letterSpacing: 0.5 }}
                onFocus={(e) => (e.target.style.borderColor = "#3B82F6")} onBlur={(e) => (e.target.style.borderColor = "#1E293B")} />
              {orderId.trim() && <div style={{ marginTop: 8, fontSize: 12, color: "#10B981", fontWeight: 600 }}>✓ Order ID: {orderId.trim()}</div>}
            </div>

            {manualMode && (
              <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 16, padding: 28, marginBottom: 20 }}>
                <label style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", letterSpacing: 1.2, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Step 2 — Tracking Number</label>
                <input type="text" value={manualTracking} onChange={(e) => setManualTracking(e.target.value)} placeholder="e.g. 7977 0107 7682"
                  style={{ width: "100%", background: "#0B0E14", border: "2px solid #1E293B", borderRadius: 12, padding: "14px 18px", color: "#F1F5F9", fontSize: 16, fontWeight: 700, outline: "none", letterSpacing: 0.5, marginBottom: 12 }}
                  onFocus={(e) => (e.target.style.borderColor = "#3B82F6")} onBlur={(e) => (e.target.style.borderColor = "#1E293B")} />
                <label style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", letterSpacing: 1.2, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Courier</label>
                <select value={manualCourier} onChange={(e) => setManualCourier(e.target.value)}
                  style={{ width: "100%", background: "#0B0E14", border: "2px solid #1E293B", borderRadius: 12, padding: "14px 18px", color: "#F1F5F9", fontSize: 14, fontWeight: 600, outline: "none" }}>
                  <option>FedEx Ground</option>
                  <option>FedEx Express</option>
                  <option>UPS</option>
                  <option>USPS</option>
                  <option>Amazon</option>
                  <option>DHL</option>
                  <option>Other</option>
                </select>
              </div>
            )}

            <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 16, padding: 28, marginBottom: 20 }}>
              <label style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", letterSpacing: 1.2, textTransform: "uppercase", display: "block", marginBottom: 12 }}>{manualMode ? "Step 3" : "Step 2"} — Upload Return Label</label>
              <div onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={handleDrop} onClick={() => fileRef.current?.click()}
                style={{ border: `2px dashed ${dragOver ? "#3B82F6" : "#334155"}`, borderRadius: 14, padding: "40px 20px", textAlign: "center", cursor: "pointer", background: dragOver ? "#1E293B44" : "#0B0E1488" }}>
                <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.pdf" multiple style={{ display: "none" }} onChange={handleFileSelect} />
                <div style={{ fontSize: 44, marginBottom: 8 }}>🏷️</div>
                <p style={{ color: "#CBD5E1", fontSize: 15, fontWeight: 600, margin: "0 0 4px" }}>Drop return labels here</p>
                <p style={{ color: "#475569", fontSize: 12, margin: 0 }}>PNG, JPG, PDF • Multiple files OK</p>
              </div>
            </div>

            {previewFiles.length > 0 && (
              <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 16, padding: 20, marginBottom: 20 }}>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
                  {previewFiles.map((f, i) => (
                    <div key={i} style={{ background: "#1E293B", borderRadius: 10, padding: "8px 14px", fontSize: 13, color: "#CBD5E1", fontWeight: 500 }}>🏷️ {f.name}</div>
                  ))}
                </div>
                <button onClick={handleSubmit} disabled={processing || !orderId.trim() || (manualMode && !manualTracking.trim())}
                  style={{ width: "100%", background: !processing && orderId.trim() && (!manualMode || manualTracking.trim()) ? "linear-gradient(135deg,#2563EB,#7C3AED)" : "#1E293B", color: !processing && orderId.trim() && (!manualMode || manualTracking.trim()) ? "#fff" : "#475569", border: "none", borderRadius: 12, padding: 16, fontSize: 16, fontWeight: 800, cursor: !processing && orderId.trim() && (!manualMode || manualTracking.trim()) ? "pointer" : "not-allowed", fontFamily: "'Outfit'" }}>
                  {processing ? <span style={{ animation: "pulse 1.5s infinite" }}>⏳ Syncing to Google...</span> : "🚀 Sync to Google Sheet & Drive"}
                </button>
              </div>
            )}

            <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 14, padding: "20px 24px" }}>
              <p style={{ fontSize: 12, fontWeight: 700, color: "#94A3B8", margin: "0 0 12px", letterSpacing: 0.5, textTransform: "uppercase" }}>What happens automatically</p>
              {[
                { icon: manualMode ? "✏️" : "🤖", text: manualMode ? "You enter tracking number manually" : "AI reads label → extracts tracking + courier", color: "#F59E0B" },
                { icon: "📁", text: "Label image uploaded to 'Return labels' Drive folder", color: "#3B82F6" },
                { icon: "📊", text: "New row added to 'N8N' Sheet → Order ID + Tracking + Courier + Drive link", color: "#10B981" },
              ].map((s, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                  <div style={{ width: 32, height: 32, borderRadius: 8, background: s.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{s.icon}</div>
                  <span style={{ fontSize: 13, color: "#CBD5E1" }}>{s.text}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab === "records" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
              <p style={{ color: "#64748B", fontSize: 13, margin: 0 }}>{records.length} record(s) — auto-synced to Google Sheet</p>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={exportCSV} disabled={!records.length}
                  style={{ background: records.length ? "#059669" : "#1E293B", color: records.length ? "#fff" : "#475569", border: "none", borderRadius: 10, padding: "10px 20px", fontSize: 12, fontWeight: 700, cursor: records.length ? "pointer" : "not-allowed" }}>📥 Export CSV</button>
                <button onClick={clearAll} disabled={!records.length}
                  style={{ background: records.length ? "#7F1D1D" : "#1E293B", color: records.length ? "#FCA5A5" : "#475569", border: "none", borderRadius: 10, padding: "10px 16px", fontSize: 12, fontWeight: 700, cursor: records.length ? "pointer" : "not-allowed" }}>Clear All</button>
              </div>
            </div>

            {records.length > 0 ? (
              <div style={{ background: "#111827", border: "1px solid #1E293B", borderRadius: 16, overflow: "hidden" }}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ borderBottom: "1px solid #1E293B" }}>
                        {["#", "Order ID", "Tracking #", "Courier", "Label", "Date", "Status", ""].map((h) => (
                          <th key={h} style={{ padding: 14, textAlign: "left", fontSize: 10, fontWeight: 700, color: "#64748B", letterSpacing: 0.8, textTransform: "uppercase" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {records.map((r, idx) => (
                        <tr key={r.id} style={{ borderBottom: "1px solid #1E293B11" }}>
                          <td style={{ padding: 14, fontSize: 12, color: "#475569" }}>{records.length - idx}</td>
                          <td style={{ padding: 14, fontWeight: 800, fontSize: 14, color: "#60A5FA", fontFamily: "'Outfit'" }}>{r.orderId}</td>
                          <td style={{ padding: 14, fontFamily: "monospace", fontSize: 13, fontWeight: 700, color: r.tracking === "ERROR" || r.tracking === "NOT FOUND" ? "#EF4444" : "#F1F5F9", letterSpacing: 0.5 }}>
                            {r.status === "extracting" ? <span style={{ animation: "pulse 1.5s infinite", color: "#F59E0B" }}>Reading...</span> : r.tracking || "—"}
                          </td>
                          <td style={{ padding: 14, fontSize: 13, color: "#CBD5E1" }}>{r.courier || "—"}</td>
                          <td style={{ padding: 14 }}>
                            <span style={{ fontSize: 12, color: "#94A3B8", background: "#1E293B", padding: "4px 10px", borderRadius: 6 }}>
                              🏷️ {r.fileName?.length > 16 ? r.fileName.slice(0, 14) + "…" : r.fileName}
                            </span>
                          </td>
                          <td style={{ padding: 14, fontSize: 11, color: "#64748B" }}>{r.date}</td>
                          <td style={{ padding: 14 }}><StatusBadge status={r.status} /></td>
                          <td style={{ padding: "14px 8px" }}>
                            <button onClick={() => deleteRecord(r.id)}
                              style={{ background: "transparent", border: "none", color: "#475569", cursor: "pointer", fontSize: 16, padding: "2px 6px", borderRadius: 6 }}>×</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : (
              <div style={{ textAlign: "center", padding: "60px 20px", background: "#111827", borderRadius: 16, border: "1px solid #1E293B" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📦</div>
                <p style={{ color: "#475569" }}>No records yet — upload a label to start</p>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
