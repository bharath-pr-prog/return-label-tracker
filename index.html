<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Label Tracker v3.3</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>body { background-color: #0b0e14; color: #cbd5e1; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxy_mFX8r1jaW3xr2N0UUaGTU4k8wd2MuAVaOrmBwC_X_SECyOj3OmH1mVWIVv2wW54VA/exec";

        function App() {
            const [orderId, setOrderId] = useState('');
            const [file, setFile] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [extracted, setExtracted] = useState({ trk: '', courier: '' });
            const [status, setStatus] = useState('idle');
            const [history, setHistory] = useState([]);
            const fileInputRef = useRef(null);

            const parseLabelText = (text) => {
                const cleanText = text.toUpperCase().replace(/\n/g, ' ');
                let trk = "Not Found";
                let courier = "Unknown";

                if (cleanText.includes("FEDEX")) courier = "FedEx Ground";
                if (cleanText.includes("UPS") || cleanText.includes("1Z")) courier = "UPS";

                const fedexRegex = /(?:TRK|TRACKING|TRK#|TRK#|TRKE)\s*[:#]?\s*([\d\s]{12,25})/i;
                const fedexMatch = cleanText.match(fedexRegex);

                if (fedexMatch) {
                    const digitsOnly = fedexMatch[1].replace(/[^0-9]/g, '');
                    if (digitsOnly.length >= 12) {
                        trk = digitsOnly.substring(0, 12);
                        if (courier === "Unknown") courier = "FedEx Ground";
                    }
                } 
                
                if (trk === "Not Found") {
                    const standaloneMatch = cleanText.match(/\b\d{12}\b/);
                    if (standaloneMatch) {
                        trk = standaloneMatch[0];
                        courier = "FedEx Ground";
                    }
                }

                return { trk, courier };
            };

            const handleFileUpload = async (e) => {
                const uploadedFile = e.target.files[0];
                if (!uploadedFile) return;
                setFile(uploadedFile);
                setStatus('scanning');
                const reader = new FileReader();
                reader.onloadend = () => setBase64Image(reader.result);
                reader.readAsDataURL(uploadedFile);

                try {
                    let imageSource;
                    if (uploadedFile.type === "application/pdf") {
                        const pdfjsLib = window['pdfjs-dist/build/pdf'];
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                        const arrayBuffer = await uploadedFile.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 3.0 });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        imageSource = canvas.toDataURL();
                    } else {
                        imageSource = URL.createObjectURL(uploadedFile);
                    }
                    const { data: { text } } = await Tesseract.recognize(imageSource, 'eng');
                    setExtracted(parseLabelText(text));
                    setStatus('ready');
                } catch (err) {
                    setStatus('idle');
                }
            };

            const handleSync = async () => {
                setStatus('syncing');
                const payload = { 
                    orderId: orderId, 
                    trackingNumber: extracted.trk, 
                    courier: extracted.courier, 
                    image: base64Image 
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload),
                    });
                    setHistory([{orderId, trk: extracted.trk, courier: extracted.courier}, ...history]);
                    setStatus('success');
                    setTimeout(() => {
                        setOrderId(''); setFile(null); setExtracted({ trk: '', courier: '' }); setStatus('idle');
                    }, 2000);
                } catch (error) {
                    setStatus('ready');
                }
            };

            return (
                <div className="min-h-screen p-6 font-sans flex flex-col items-center gap-6">
                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-6 shadow-2xl">
                        <h1 className="text-xl font-bold text-white tracking-tighter italic">⬢ RETURN TRACKER</h1>
                        <div className="space-y-4">
                            <div>
                                <label className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Order ID</label>
                                <input value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="CMRXXXX" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 mt-1 text-white outline-none focus:border-blue-500"/>
                            </div>
                            <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-slate-800 rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer hover:border-blue-600 transition-all">
                                <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*,.pdf" className="hidden" />
                                {file ? <p className="text-blue-400 font-bold text-sm">{file.name}</p> : <p className="text-slate-500 text-xs font-bold uppercase tracking-widest">Upload Label</p>}
                            </div>
                            {status !== 'idle' && (
                                <div className="bg-[#0b0e14] p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                                    <div><p className="text-[10px] text-slate-500 uppercase font-bold">Tracking</p><p className="font-mono text-white text-lg">{extracted.trk || '...'}</p></div>
                                    <div><p className="text-[10px] text-slate-500 uppercase font-bold">Courier</p><p className="text-blue-500 font-bold text-lg">{extracted.courier || '...'}</p></div>
                                </div>
                            )}
                            <button onClick={handleSync} disabled={status !== 'ready' || !orderId} className={`w-full py-4 rounded-xl font-black text-lg transition-all ${status==='ready'?'bg-blue-600 text-white shadow-lg shadow-blue-500/20':'bg-slate-800 text-slate-600'}`}>
                                {status === 'syncing' ? 'Syncing...' : status === 'success' ? '✓ Synced' : 'Confirm & Sync'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
