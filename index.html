<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Label Tracker v3.1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>body { background-color: #0b0e14; color: #cbd5e1; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;

        // PASTE YOUR GOOGLE DEPLOYMENT URL HERE
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdIPbZMo15VALfuFV-2oduY66z-8ufKIu1IaOgLK7pw7_B_Z73d9BEzXvXjBYzyZHQ5w/exec";

        function App() {
            const [orderId, setOrderId] = useState('');
            const [file, setFile] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [extracted, setExtracted] = useState({ trk: '', courier: '' });
            const [status, setStatus] = useState('idle');
            const [history, setHistory] = useState([]);
            const fileInputRef = useRef(null);

            const parseLabelText = (text) => {
                // Convert everything to uppercase and remove newlines for easier searching
                const cleanText = text.toUpperCase().replace(/\n/g, ' ');
                console.log("OCR Scanned Text:", cleanText);

                let trk = "Not Found";
                let courier = "Unknown";

                // 1. Determine Courier by keywords anywhere in label
                if (cleanText.includes("FEDEX")) courier = "FedEx Ground";
                if (cleanText.includes("UPS") || cleanText.includes("1Z")) courier = "UPS";

                // 2. Target the Tracking Number
                // This regex looks for 12 digits that might have spaces, 
                // specifically looking for patterns near "TRK", "TRACKING", or "TRK#"
                const trkPatterns = [
                    /(?:TRK|TRACKING|TRK#|TRK#|TRKE)\s*[:#]?\s*([\d\s]{12,20})/i, // Pattern-based
                    /\b(\d\s*){12}\b/, // Any standalone 12 digits
                    /1Z\s*[A-Z0-9\s]{16}/i // UPS pattern
                ];

                let foundTrk = null;
                for (let pattern of trkPatterns) {
                    const match = cleanText.match(pattern);
                    if (match) {
                        // Clean up the match (remove spaces, labels, etc.)
                        const potential = (match[1] || match[0]).replace(/[^0-9A-Z]/g, '');
                        if (potential.length >= 12) {
                            foundTrk = potential;
                            break;
                        }
                    }
                }

                if (foundTrk) {
                    trk = foundTrk;
                    // If we found a 12-digit number but courier is unknown, it's likely FedEx
                    if (courier === "Unknown" && trk.length === 12) courier = "FedEx Ground";
                }

                return { trk, courier };
            };

            const handleFileUpload = async (e) => {
                const uploadedFile = e.target.files[0];
                if (!uploadedFile) return;

                setFile(uploadedFile);
                setStatus('scanning');
                
                const reader = new FileReader();
                reader.onloadend = () => setBase64Image(reader.result);
                reader.readAsDataURL(uploadedFile);

                try {
                    let imageSource;
                    if (uploadedFile.type === "application/pdf") {
                        const pdfjsLib = window['pdfjs-dist/build/pdf'];
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                        const arrayBuffer = await uploadedFile.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 2.5 }); // Higher scale for better OCR
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        imageSource = canvas.toDataURL();
                    } else {
                        imageSource = URL.createObjectURL(uploadedFile);
                    }

                    const { data: { text } } = await Tesseract.recognize(imageSource, 'eng');
                    setExtracted(parseLabelText(text));
                    setStatus('ready');
                } catch (err) {
                    setStatus('idle');
                    alert("Error scanning label.");
                }
            };

            const handleSync = async () => {
                setStatus('syncing');
                const payload = { orderId, trackingNumber: extracted.trk, courier: extracted.courier, image: base64Image };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload),
                    });

                    setHistory([{orderId, trk: extracted.trk, courier: extracted.courier}, ...history]);
                    setStatus('success');
                    setTimeout(() => {
                        setOrderId(''); setFile(null); setExtracted({ trk: '', courier: '' }); setStatus('idle');
                    }, 2000);
                } catch (error) {
                    setStatus('ready');
                    alert("Sync failed. Check connection.");
                }
            };

            return (
                <div className="min-h-screen p-6 font-sans flex flex-col items-center gap-6">
                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-6 shadow-2xl">
                        <div className="flex justify-between items-center">
                            <h1 className="text-xl font-bold text-white font-mono tracking-tighter">⬢ RETURN TRACKER</h1>
                            <div className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest border border-emerald-900/30 px-3 py-1 rounded-full bg-emerald-900/10">Scanner v3.1</div>
                        </div>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Step 1 — Order ID</label>
                                <input value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="e.g. CMR3294" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 mt-1 text-white outline-none focus:border-blue-500 transition-all"/>
                            </div>

                            <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-slate-700 rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 hover:bg-blue-500/5 transition-all">
                                <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*,.pdf" className="hidden" />
                                {file ? (
                                    <div className="text-center">
                                        <p className="text-blue-400 font-bold text-sm">{file.name}</p>
                                        <p className="text-[10px] text-slate-600 mt-1 uppercase font-bold">Click to Change File</p>
                                    </div>
                                ) : (
                                    <div className="text-center">
                                        <div className="text-3xl mb-2">📄</div>
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Upload Return Label</p>
                                    </div>
                                )}
                            </div>

                            {status !== 'idle' && (
                                <div className="bg-[#0b0e14] p-5 rounded-2xl border border-slate-800 space-y-4 animate-in fade-in zoom-in duration-300">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <p className="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Tracking Number</p>
                                            <p className={`font-mono text-lg font-bold mt-1 ${extracted.trk === 'Not Found' ? 'text-red-500' : 'text-white'}`}>
                                                {status === 'scanning' ? 'Scanning...' : extracted.trk}
                                            </p>
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Courier</p>
                                            <p className="text-blue-400 font-bold text-lg mt-1">
                                                {status === 'scanning' ? 'Checking...' : extracted.courier}
                                            </p>
                                        </div>
                                    </div>
                                    {status === 'scanning' && (
                                        <div className="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-blue-500 w-1/2 animate-infinite-scroll"></div>
                                        </div>
                                    )}
                                </div>
                            )}

                            <button onClick={handleSync} disabled={status !== 'ready' || !orderId || extracted.trk === 'Not Found'} className={`w-full py-5 rounded-2xl font-bold text-lg transition-all ${status==='ready' && extracted.trk !== 'Not Found' ?'bg-blue-600 text-white shadow-lg shadow-blue-500/20':'bg-slate-800 text-slate-600'}`}>
                                {status === 'syncing' ? 'Syncing...' : status === 'success' ? '✓ Synced!' : 'Confirm & Sync'}
                            </button>
                        </div>
                    </div>

                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-4 shadow-2xl">
                        <h2 className="text-xs font-bold text-slate-500 uppercase tracking-widest">Recent Session Activity ({history.length})</h2>
                        <div className="space-y-3">
                            {history.length === 0 && <p className="text-slate-600 text-[10px] uppercase font-bold text-center py-4 tracking-widest">Awaiting first sync</p>}
                            {history.map((rec, i) => (
                                <div key={i} className="flex justify-between items-center bg-[#0b0e14] p-4 rounded-xl border border-slate-800">
                                    <div>
                                        <p className="text-white font-bold text-sm">{rec.orderId}</p>
                                        <p className="text-[10px] text-slate-500 font-mono tracking-wider mt-0.5">{rec.trk}</p>
                                    </div>
                                    <span className="text-[9px] font-bold uppercase bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full border border-blue-800/50">{rec.courier}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
