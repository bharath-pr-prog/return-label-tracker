<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Label Tracker v3.2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>body { background-color: #0b0e14; color: #cbd5e1; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;

        // PASTE YOUR GOOGLE DEPLOYMENT URL HERE
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwko-XPZAj31gLGRbJZjcrcACg5iFmPYac_aU7g8_qYxOHHC8JDzVfJfwMBrY02bkSFyQ/exec";

        function App() {
            const [orderId, setOrderId] = useState('');
            const [file, setFile] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [extracted, setExtracted] = useState({ trk: '', courier: '' });
            const [status, setStatus] = useState('idle');
            const [history, setHistory] = useState([]);
            const fileInputRef = useRef(null);

            const parseLabelText = (text) => {
                const cleanText = text.toUpperCase().replace(/\n/g, ' ');
                console.log("OCR Scanned Text:", cleanText);

                let trk = "Not Found";
                let courier = "Unknown";

                // 1. Detect Courier
                if (cleanText.includes("FEDEX")) courier = "FedEx Ground";
                if (cleanText.includes("UPS") || cleanText.includes("1Z")) courier = "UPS";

                // 2. Specialized FedEx Logic: Look for TRK sequence and take exactly 12 digits
                const fedexRegex = /(?:TRK|TRACKING|TRK#|TRK#|TRKE)\s*[:#]?\s*([\d\s]{12,25})/i;
                const fedexMatch = cleanText.match(fedexRegex);

                if (fedexMatch) {
                    // Extract only the numbers
                    const digitsOnly = fedexMatch[1].replace(/[^0-9]/g, '');
                    // Take ONLY the first 12 digits (Standard FedEx Ground)
                    if (digitsOnly.length >= 12) {
                        trk = digitsOnly.substring(0, 12);
                        if (courier === "Unknown") courier = "FedEx Ground";
                    }
                } 
                
                // 3. Fallback for UPS
                if (trk === "Not Found") {
                    const upsMatch = cleanText.match(/1Z\s*[A-Z0-9\s]{16}/i);
                    if (upsMatch) {
                        trk = upsMatch[0].replace(/\s/g, '');
                        courier = "UPS";
                    }
                }

                // 4. Last Resort: Standalone 12-digit search
                if (trk === "Not Found") {
                    const standaloneMatch = cleanText.match(/\b\d{12}\b/);
                    if (standaloneMatch) {
                        trk = standaloneMatch[0];
                        courier = "FedEx Ground";
                    }
                }

                return { trk, courier };
            };

            const handleFileUpload = async (e) => {
                const uploadedFile = e.target.files[0];
                if (!uploadedFile) return;

                setFile(uploadedFile);
                setStatus('scanning');
                
                const reader = new FileReader();
                reader.onloadend = () => setBase64Image(reader.result);
                reader.readAsDataURL(uploadedFile);

                try {
                    let imageSource;
                    if (uploadedFile.type === "application/pdf") {
                        const pdfjsLib = window['pdfjs-dist/build/pdf'];
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                        const arrayBuffer = await uploadedFile.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 3.0 }); // Even higher scale for accuracy
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        imageSource = canvas.toDataURL();
                    } else {
                        imageSource = URL.createObjectURL(uploadedFile);
                    }

                    const { data: { text } } = await Tesseract.recognize(imageSource, 'eng');
                    setExtracted(parseLabelText(text));
                    setStatus('ready');
                } catch (err) {
                    setStatus('idle');
                    alert("Scanning failed.");
                }
            };

            const handleSync = async () => {
                setStatus('syncing');
                const payload = { orderId, trackingNumber: extracted.trk, courier: extracted.courier, image: base64Image };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload),
                    });

                    // Update history immediately for the user
                    setHistory([{orderId, trk: extracted.trk, courier: extracted.courier, time: new Date().toLocaleTimeString()}, ...history]);

                    setStatus('success');
                    setTimeout(() => {
                        setOrderId(''); setFile(null); setExtracted({ trk: '', courier: '' }); setStatus('idle');
                    }, 2000);
                } catch (error) {
                    setStatus('ready');
                    alert("Sync completed.");
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10 font-sans flex flex-col items-center gap-6 text-slate-300">
                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-6 shadow-2xl shadow-blue-500/5">
                        <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                            <h1 className="text-xl font-bold text-white tracking-tight italic">⬢ RETURN TRACKER</h1>
                            <span className="text-[10px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 font-bold uppercase tracking-tighter">Scanner v3.2</span>
                        </div>
                        
                        <div className="space-y-5">
                            <div>
                                <label className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Step 1 — Order ID</label>
                                <input value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="Enter ID (e.g. CMR3995)" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 mt-2 text-white outline-none focus:border-blue-500 transition-all placeholder:text-slate-700 font-bold"/>
                            </div>

                            <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-slate-800 rounded-2xl p-12 flex flex-col items-center justify-center cursor-pointer hover:border-blue-600/50 hover:bg-blue-600/5 transition-all group">
                                <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*,.pdf" className="hidden" />
                                {file ? (
                                    <div className="text-center">
                                        <p className="text-blue-400 font-bold text-sm underline underline-offset-4">{file.name}</p>
                                        <p className="text-[10px] text-slate-600 mt-2 font-bold uppercase">Change Label</p>
                                    </div>
                                ) : (
                                    <div className="text-center space-y-2">
                                        <div className="text-4xl grayscale group-hover:grayscale-0 transition-all">📤</div>
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Upload Label Image</p>
                                    </div>
                                )}
                            </div>

                            {status !== 'idle' && (
                                <div className="bg-[#0b0e14] p-6 rounded-2xl border border-slate-800 space-y-4 shadow-inner">
                                    <div className="grid grid-cols-2 gap-6">
                                        <div>
                                            <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Tracking Number</p>
                                            <p className={`font-mono text-xl font-bold mt-1 ${extracted.trk === 'Not Found' ? 'text-red-500' : 'text-white'}`}>
                                                {status === 'scanning' ? '...' : extracted.trk}
                                            </p>
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Courier</p>
                                            <p className="text-blue-500 font-black text-lg mt-1 italic">
                                                {status === 'scanning' ? '...' : extracted.courier}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <button onClick={handleSync} disabled={status !== 'ready' || !orderId || extracted.trk === 'Not Found'} className={`w-full py-5 rounded-2xl font-black text-lg transition-all transform active:scale-[0.98] ${status==='ready' && extracted.trk !== 'Not Found' ?'bg-blue-600 text-white shadow-xl shadow-blue-600/20 hover:bg-blue-500':'bg-slate-800 text-slate-600'}`}>
                                {status === 'syncing' ? 'Syncing to Cloud...' : status === 'success' ? '✓ Synced Successfully' : 'Confirm & Sync Data'}
                            </button>
                        </div>
                    </div>

                    {/* Dashboard List */}
                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-3xl p-8 space-y-5 shadow-2xl shadow-black">
                        <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                            <h2 className="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">Recent Session Activity</h2>
                            <span className="text-[10px] font-bold text-slate-600">COUNT: {history.length}</span>
                        </div>
                        <div className="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                            {history.length === 0 && <p className="text-slate-700 text-[10px] uppercase font-bold text-center py-6 tracking-widest italic">Awaiting first scan...</p>}
                            {history.map((rec, i) => (
                                <div key={i} className="flex justify-between items-center bg-[#0b0e14] p-4 rounded-xl border border-slate-800 hover:border-slate-700 transition-colors">
                                    <div>
                                        <div className="flex items-center gap-2">
                                            <p className="text-white font-bold text-sm">{rec.orderId}</p>
                                            <span className="text-[8px] text-slate-600 font-bold">{rec.time}</span>
                                        </div>
                                        <p className="text-[10px] text-slate-500 font-mono mt-0.5">{rec.trk}</p>
                                    </div>
                                    <span className="text-[8px] font-black uppercase bg-blue-500/5 text-blue-500 px-3 py-1.5 rounded-lg border border-blue-500/10">{rec.courier}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
